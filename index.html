<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- ✅ SEO Title (Global) -->
  <title>Lumina Chinese Learning Center | AI-Powered Global Mandarin Education Platform</title>

  <!-- ✅ SEO Description -->
  <meta name="description" content="Lumina Chinese Learning Center is an AI-powered global Mandarin education platform offering structured HSK courses, interactive character writing, and real-world speaking practice for learners worldwide." />

  <!-- (Optional) keywords: not very important for Google, but harmless -->
  <meta name="keywords" content="Mandarin learning, HSK course, AI Chinese learning, global Chinese education, Chinese character writing, online Mandarin platform" />
  <meta name="author" content="Lumina Chinese Learning Center" />

  <!-- ✅ Open Graph (share preview) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Lumina Chinese Learning Center" />
  <meta property="og:description" content="AI-powered global Mandarin education platform — HSK, speaking, and character writing practice for learners worldwide." />
  <!-- TODO: 换成你的正式域名（例如 https://lumina...） -->
  <meta property="og:url" content="https://example.com" />
  <!-- TODO: 你之后放一张分享图，尺寸建议 1200x630 -->
  <meta property="og:image" content="https://example.com/og-image.png" />

  <!-- ✅ Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lumina Chinese Learning Center" />
  <meta name="twitter:description" content="AI-powered global Mandarin education platform — structured HSK, speaking, and character writing practice." />
  <meta name="twitter:image" content="https://example.com/og-image.png" />

  <!-- ✅ Favicon (可先不放，后面你有 logo 再加) -->
  <!-- <link rel="icon" href="/favicon.ico" /> -->

  <!-- ✅ CSS：保留你的版本号 -->
  <link rel="stylesheet" href="./ui/styles/base.css?v=20260202">
  <link rel="stylesheet" href="./ui/styles/panels.css?v=20260201">
</head>

<body>
  <!-- ✅ 顶部区域：只留容器，不要再包 card -->
  <header class="wrap">
    <div id="siteNav"></div>
  </header>

  <!-- ✅ 页面内容注入点 -->
  <main id="app" class="wrap"></main>

  <!-- ✅ 底部 -->
  <footer class="wrap">
    <div id="siteFooter"></div>
  </footer>

  <!-- ✅ 全站工具 -->
  <script src="./ui/dataPaths.js?v=20260201"></script>

  <!-- ✅ 全站入口 -->
  <script type="module" src="./ui/app.js?v=20260201"></script>
</body>
