<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Joy Chinese | HSK</title>

  <link rel="stylesheet" href="/ui/styles/base.css?v=20260303">
  <link rel="stylesheet" href="/ui/styles/panels.css?v=20260303">
  <link rel="stylesheet" href="/ui/styles/wordcard.css?v=20260303">
  <link rel="stylesheet" href="/ui/styles/hsk.css?v=20260330">
  <link rel="stylesheet" href="/ui/styles/scene.css?v=20260305">
  <link rel="stylesheet" href="/ui/styles/practice.css?v=20260305">
  <script src="/ui/dataPaths.js"></script>
</head>

<body>
  <header class="wrap">
    <div id="siteNav"></div>
  </header>

  <main id="app" class="wrap"></main>

  <footer class="wrap">
    <div id="siteFooter"></div>
  </footer>

  <!-- ✅ 只允许一个 module 入口 -->
  <script type="module">
    import { i18n } from "/ui/i18n.js";
    import { mountNavBar } from "/ui/components/navBar.js";
    import { mount as mountHSK } from "/ui/pages/page.hsk.js";

    // 初始化语言
    i18n.init({
      defaultLang: "kr",
      storageKey: "joy_lang",
      autoApplyRoot: document,
      observe: true
    });

    // 加载 /lang 语言包
    await i18n.load();

    i18n.apply(document);

    // 挂载导航
    mountNavBar(document.getElementById("siteNav"));

    // 挂载 HSK 页面
    await mountHSK();
  </script>
</body>
</html>
