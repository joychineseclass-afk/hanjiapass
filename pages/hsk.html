<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Joy Chinese · HSK</title>

  <!-- 你的全局样式（按你项目实际路径） -->
  <link rel="stylesheet" href="/ui/styles.css" />
</head>

<body>
  <div id="siteNav"></div>
  <main id="app"></main>

  <script type="module">
    import { i18n } from "/ui/i18n.js";
    import { mountNavBar } from "/ui/components/navBar.js";
    import { mount as mountHSK } from "/ui/pages/page.hsk.js";

    // 统一入口：语言初始化（会读取 localStorage 的 joy_lang）
    i18n.init({ defaultLang: "kr", storageKey: "joy_lang" });

    mountNavBar(document.getElementById("siteNav"));
    mountHSK();
  </script>
  <script type="module" src="/ui/pages/page.hsk.js"></script>
</body>
</html>
